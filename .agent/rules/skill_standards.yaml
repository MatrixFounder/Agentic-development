# .agent/rules/skill_standards.yaml
# NOTE: Must be compatible with Simple "Vanilla Python" Parser.
# No advanced YAML features (anchors, complex mapping keys).

project_config:
  # Optional: Path to a documentation file listing all skills.
  # If defined, scripts will remind the user to update this file.
  catalog_file: "System/Docs/SKILLS.md" 

  skills_root: ".agent/skills" 

taxonomy:
  tiers:
    - value: 0
      name: "Bootstrap"
      description: "Critical system skills loaded at session start."
    - value: 1
      name: "Phase-Triggered"
      description: "Loaded automatically when entering specific phases."
    - value: 2
      name: "Extended"
      description: "Specialized skills loaded only when requested."
    - value: 3
      name: "High Assurance"
      description: "Strict, rigorous protocols for critical stability."

validation:
  enforce_cso_prefix: false
  allowed_cso_prefixes: 
    - "Use when"
    - "Guidelines for"
    - "Standards for"
    - "Defines"
  # Legacy exceptions: keep critical full-context skills intact.
  # NOTE (Task 064): with the two-tier policy (warn 20 / fail 60) most skills
  # no longer need this allowlist; kept as a safety net, prefer trimming over adding.
  inline_exempt_skills:
    - "skill-safe-commands"
    - "skill-orchestrator-patterns"
  # Fence languages exempt from the inline-size check entirely (diagrams).
  inline_exempt_fence_langs:
    - "mermaid"
  # Fence languages that can only warn, never hard-fail (output samples).
  inline_softcheck_fence_langs:
    - "text"
    - "console"
    - "output"

  required_sections:
    - "Red Flags"
    - "Rationalization Table"
  
  # Default is EMPTY []. Antigravity project override:
  prohibited_files:
    - "README.md"
    - "CHANGELOG.md"
    
  quality_checks:
    # Two-tier inline code-block policy (Task 064): > warn -> warning, > fail -> error.
    max_inline_lines_warn: 20
    max_inline_lines_fail: 60
    max_description_words: 70
    banned_words:
      - "should"
      - "can"
      - "try to"
